CONFIG_ZMK_KEYBOARD_NAME="BGKeeB"

CONFIG_ZMK_SPLIT=y

CONFIG_ZMK_BLE_PASSKEY_ENTRY=n

#ZMK Logging
CONFIG_LOG=y
CONFIG_ZMK_LOG_LEVEL_DBG=y

#Uncomment these two lines to enable encoder support
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Sleep
# Idle sleep timeout - 5 mins
CONFIG_ZMK_IDLE_TIMEOUT=300000
# Enable deep sleep
CONFIG_ZMK_SLEEP=y
# Deep sleep timeout - 15 mins
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# ZMK Mouse Controls
CONFIG_ZMK_POINTING=y

#ZMK Studio 
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Enable battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
# Enable central (left half) to report both battery levels to host
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y          

# Uncomment for Single color backlight
# CONFIG_ZMK_BACKLIGHT=y

# Uncomment for RGB
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment for Display
# CONFIG_ZMK_DISPLAY=y


